<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <link rel="icon" type="image/png" href="/nexa.png" />
    <script>
      (function () {
        try {
          var k = 'nexa-admin-theme'
          var t = localStorage.getItem(k)
          if (t !== 'light' && t !== 'dark')
            t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark'
          document.documentElement.setAttribute('data-theme', t)
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', t === 'light' ? '#fafafa' : '#09090b')
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <title>Nexa Admin — Ecosystem Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
